name: Timeclock reminder

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check who has not submitted and post to Discord
        run: |
          MSG=$(curl -s -X POST \
            "https://vajrnbniwkvnkkkigeit.supabase.co/rest/v1/rpc/tc_missing_report" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"tok\": \"${{ secrets.LOWSTOCK_TOKEN }}\"}")
          if [ -z "$MSG" ] || [ "$MSG" = "null" ]; then
            echo "No report returned (check LOWSTOCK_TOKEN matches the SQL function)"; exit 1
          fi
          echo "$MSG" | jq '{content: .}' > payload.json
          curl -s -X POST -H "Content-Type: application/json" \
            -d @payload.json "${{ secrets.DISCORD_WEBHOOK }}"
