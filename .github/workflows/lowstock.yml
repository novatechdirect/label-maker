name: Low stock report

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch low-stock report and post to Discord
        run: |
          MSG=$(curl -s -X POST \
            "https://vajrnbniwkvnkkkigeit.supabase.co/rest/v1/rpc/low_stock_report" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"tok\": \"${{ secrets.LOWSTOCK_TOKEN }}\"}")
          if [ -z "$MSG" ] || [ "$MSG" = "null" ]; then
            echo "No report returned (check LOWSTOCK_TOKEN matches the SQL function)"; exit 1
          fi
          # Ping people only when something is actually low
          if echo "$MSG" | grep -q "All good"; then
            echo "$MSG" | jq '{content: .}' > payload.json
          else
            echo "$MSG" | jq '{content: ("<@392524726767190017> @everyone\n" + .)}' > payload.json
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d @payload.json "${{ secrets.DISCORD_WEBHOOK }}"
